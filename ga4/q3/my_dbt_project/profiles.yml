# profiles.yml
# This is like telling dbt "here's where your database lives"

my_dbt_project:
  target: dev
  outputs:
    dev:
      type: sqlite
      threads: 1
      database: "saas_customers"
      schema: "main"
      schemas_and_paths:
        main: "../saas_customers.db"   # one folder up from my_dbt_project/
      schema_directory: "../"
